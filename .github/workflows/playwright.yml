name: Playwright Tests
on:
  repository_dispatch:
    types:
      - vercel.deployment.success
jobs:
  test:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium # Only install chromium as per our config

      - name: Run Playwright tests
        run: npx playwright test
        env:
          # Deployment URL from Vercel's repository_dispatch payload
          BASE_URL: ${{ github.event.client_payload.url }}
          # Add VERA CI environment variables
          VERA_API_KEY: ${{ secrets.VERA_API_KEY }}
          VERA_PROJECT_ID: ${{ vars.VERA_PROJECT_ID }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          VERA_CI_BRANCH: ${{ github.ref_name }}
